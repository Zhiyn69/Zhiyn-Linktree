    <!-- Script for Dark/Light Mode Toggle -->
    <script>
        const htmlElement = document.documentElement;
        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');

        // Function to set icon based on current theme
        const updateIcon = () => {
            if (htmlElement.classList.contains('dark')) {
                themeIcon.classList.remove('fa-moon');
                themeIcon.classList.add('fa-sun');
                themeToggleBtn.classList.add('text-yellow-400');
                themeToggleBtn.classList.remove('text-indigo-600');
            } else {
                themeIcon.classList.remove('fa-sun');
                themeIcon.classList.add('fa-moon');
                themeToggleBtn.classList.remove('text-yellow-400');
                themeToggleBtn.classList.add('text-indigo-600');
            }
        };

        // Initialize icon
        updateIcon();

        // Toggle theme on click
        themeToggleBtn.addEventListener('click', () => {
            htmlElement.classList.toggle('dark');
            updateIcon();
        });
    </script>
